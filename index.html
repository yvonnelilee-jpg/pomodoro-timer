<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="app">
        <main class="pomodoro-timer" aria-labelledby="mode-indicator">
            <div class="pomodoro-timer__case">
                <span class="shape-decor" aria-hidden="true"></span>
                <span class="shape-decor-2" aria-hidden="true"></span>
                <span class="shape-decor-3" aria-hidden="true"></span>
                <span class="shape-decor-4" aria-hidden="true"></span>
                <span class="shape-decor-5" aria-hidden="true"></span>
                <span class="shape-decor-6" aria-hidden="true"></span>
                <span class="shape-decor-7" aria-hidden="true"></span>
                <span class="shape-decor-8" aria-hidden="true"></span>
                <div class="tamagotchi-screen">
                    <section class="timer-setup" aria-label="Set duration">
                        <div id="duration-wheels" class="wheel-picker">
                            <div class="wheel-picker__chrome">
                                <div class="wheel-picker__fade wheel-picker__fade--top" aria-hidden="true"></div>
                                <div class="wheel-picker__fade wheel-picker__fade--bottom" aria-hidden="true"></div>
                                <div class="wheel-picker__highlight" aria-hidden="true"></div>
                                <div class="wheel-picker__columns" id="wheel-picker-columns"></div>
                            </div>
                        </div>
                    </section>

                    <div class="pomodoro-timer__face">
                        <section class="timer-readout" aria-label="Time remaining">
                            <time id="timer-display" class="timer-readout__tiles" datetime="PT0H25M0S">
                                <span class="flip-tile" id="timer-hours" data-flip-initial="00"></span>
                                <span class="timer-readout__colon" aria-hidden="true">:</span>
                                <span class="flip-tile" id="timer-minutes" data-flip-initial="25"></span>
                                <span class="timer-readout__colon" aria-hidden="true">:</span>
                                <span class="flip-tile" id="timer-seconds" data-flip-initial="00"></span>
                            </time>
                            <div class="timer-mode">
                                <span class="timer-mode__led" aria-hidden="true"></span>
                                <p id="mode-indicator" class="timer-mode__label" role="status">Set</p>
                            </div>
                        </section>
                    </div>

                    <div class="timer-controls" role="group" aria-label="Timer controls">
                        <button type="button" id="start-pause-btn" class="timer-controls__btn timer-controls__btn--primary">
                            Start
                        </button>
                        <button type="button" id="reset-btn" class="timer-controls__btn timer-controls__btn--secondary">
                            Reset
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Shared flip layers (cloned into each `.flip-tile` by `flip-tile.js`) -->
    <template id="flip-tile-layers-template">
        <div class="flip-tile__stage" aria-hidden="true">
            <span class="flip-tile__half flip-tile__half--top">
                <span class="flip-tile__text"></span>
            </span>
            <span class="flip-tile__half flip-tile__half--bottom">
                <span class="flip-tile__text"></span>
            </span>
            <span class="flip-tile__flap flip-tile__flap--top">
                <span class="flip-tile__text"></span>
            </span>
            <span class="flip-tile__flap flip-tile__flap--bottom">
                <span class="flip-tile__text"></span>
            </span>
        </div>
    </template>

    <!-- One wheel column (cloned ×3 by `wheel-picker.js`) -->
    <template id="wheel-picker-column-template">
        <div class="wheel-picker__column">
            <div
                class="wheel-picker__viewport"
                tabindex="0"
                role="listbox"
                data-wheel-viewport
            >
                <div class="wheel-picker__track" data-wheel-track></div>
            </div>
        </div>
    </template>

    <!-- One wheel option row (cloned per value by `wheel-picker.js`) -->
    <template id="wheel-picker-row-template">
        <div class="wheel-picker__item">
            <span class="wheel-picker__num"></span>
            <span class="wheel-picker__unit"></span>
        </div>
    </template>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
